<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Authorizing - Taxi Overath CMS</title>
</head>
<body>
  <script>
    var fragment = new URLSearchParams(window.location.hash.slice(1));
    var token = fragment.get('access_token');
    var error = fragment.get('error');

    if (token) {
      if (window.opener) {
        window.opener.postMessage({ type: 'authorization', token: token }, '*');
        window.close();
      } else {
        document.body.textContent = 'Authorizing... done! Kein opener gefunden.';
      }
    } else if (error) {
      document.body.textContent = 'Fehler: ' + error;
      if (window.opener) {
        window.opener.postMessage({ type: 'error', error: error }, '*');
        window.close();
      }
    } else {
      document.body.textContent = 'Kein Token empfangen. Fragment: ' + window.location.hash;
    }
  </script>
  <p>Authorizing...</p>
</body>
</html>
