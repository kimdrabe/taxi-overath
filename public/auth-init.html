<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Weiterleitung zu GitHub...</title>
</head>
<body>
  <script>
    var params = new URLSearchParams(window.location.search);
    var siteId = params.get('site_id') || 'taxi-overath.pages.dev';

    var clientId = 'Ov23liNbp3aoeUEvfF3f';
    var baseUrl = 'https://' + siteId;
    var redirectUri = baseUrl + '/auth/github';

    var githubUrl = 'https://github.com/login/oauth/authorize'
      + '?client_id=' + encodeURIComponent(clientId)
      + '&redirect_uri=' + encodeURIComponent(redirectUri)
      + '&scope=repo'
      + '&response_type=code';

    window.location.replace(githubUrl);
  </script>
  <p>Weiterleitung zu GitHub...</p>
</body>
</html>
