<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Authorisierung - Taxi Overath</title>
</head>
<body>
  <p>Authorisierung läuft...</p>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var provider = params.get('provider') || 'github';

      var clientId = 'Ov23liNbp3aoeUEvfF3f';
      var redirectUri = window.location.origin + '/taxi-overath/admin/callback.html';
      var githubUrl = 'https://github.com/login/oauth/authorize'
        + '?client_id=' + encodeURIComponent(clientId)
        + '&redirect_uri=' + encodeURIComponent(redirectUri)
        + '&response_type=token'
        + '&scope=repo';

      if (window.opener) {
        window.opener.postMessage('authorizing:' + provider, '*');
        var handler = function(e) {
          if (e.data === 'authorizing:' + provider) {
            window.removeEventListener('message', handler, false);
            window.location.href = githubUrl;
          }
        };
        window.addEventListener('message', handler, false);
      } else {
        window.location.href = githubUrl;
      }
    })();
  </script>
</body>
</html>
