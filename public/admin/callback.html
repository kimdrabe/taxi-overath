<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Authorisierung abgeschlossen</title>
</head>
<body>
  <p>Authorisierung erfolgreich. Dieses Fenster schließt sich gleich...</p>
  <script>
    (function() {
      var hash = window.location.hash.replace(/^#\/?/, '');
      var params = new URLSearchParams(hash);
      var token = params.get('access_token');
      var error = params.get('error');

      if (token) {
        try {
          window.localStorage.setItem('netlify-cms-user', JSON.stringify({ token: token, backendName: 'github' }));
          window.localStorage.setItem('decap-cms-user', JSON.stringify({ token: token, backendName: 'github' }));
          window.sessionStorage.setItem('github_token', token);
        } catch(e) {}
        if (window.opener) {
          window.opener.postMessage('authorization:github:success:' + JSON.stringify({ token: token }), '*');
          try { window.opener.location.hash = 'access_token=' + encodeURIComponent(token); } catch(e) {}
        }
      } else if (error) {
        if (window.opener) {
          window.opener.postMessage('authorization:github:error:' + JSON.stringify({ message: error }), '*');
        }
      }

      setTimeout(function() {
        if (window.opener) { window.close(); }
      }, 1000);
    })();
  </script>
</body>
</html>
