<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Taxi Overath</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0b1120; color: #fff; line-height: 1.5; }
    .container { max-width: 800px; margin: 0 auto; padding: 20px; }
    h1 { font-size: 1.5rem; margin-bottom: 20px; color: #eab308; }
    label { display: block; margin-bottom: 5px; color: #94a3b8; font-size: 0.875rem; }
    input, textarea { width: 100%; padding: 10px; background: #111d32; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 0.9rem; margin-bottom: 15px; font-family: inherit; }
    input:focus, textarea:focus { outline: none; border-color: #eab308; }
    textarea { resize: vertical; min-height: 80px; }
    .card { background: #111d32; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .card h2 { font-size: 1.1rem; margin-bottom: 15px; color: #eab308; }
    .btn { background: #eab308; color: #000; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 1rem; }
    .btn:hover { background: #ca8a04; }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .login-screen { text-align: center; padding: 60px 20px; }
    .login-screen h1 { font-size: 2rem; margin-bottom: 10px; }
    .login-screen p { color: #94a3b8; margin-bottom: 30px; }
    .login-screen input { max-width: 400px; margin: 0 auto 15px; }
    .save-all { position: sticky; bottom: 0; background: #0b1120; padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.08); margin-top: 30px; }
    .section-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 30px; }
    .section-tabs button { padding: 8px 16px; background: #111d32; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; color: #94a3b8; cursor: pointer; font-size: 0.85rem; }
    .section-tabs button.active { background: #eab308; color: #000; border-color: #eab308; font-weight: 600; }
    .section-tabs button:hover:not(.active) { border-color: #eab308; }
    .status { display: none; padding: 12px; border-radius: 8px; margin-top: 10px; font-size: 0.9rem; white-space: pre-wrap; }
    .status.show { display: block; }
    .status.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #22c55e; }
    .status.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; }
    .status.loading { background: rgba(234,179,8,0.1); border: 1px solid rgba(234,179,8,0.3); color: #eab308; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div id="login-screen" class="login-screen">
      <h1>Taxi Overath Admin</h1>
      <p>GitHub Personal Access Token eingeben</p>
      <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off" />
      <button class="btn" onclick="login()">Login</button>
      <p style="margin-top:15px;font-size:0.8rem;color:#64748b;">Token wird nur lokal gespeichert. Benötigt <strong>repo</strong>-Scope.</p>
    </div>

    <div id="admin" class="hidden">
      <div class="header">
        <h1>Taxi Overath Admin</h1>
        <button class="btn" onclick="logout()" style="background:transparent;border:1px solid rgba(255,255,255,0.2);color:#fff;padding:8px 16px;font-size:0.85rem;">Abmelden</button>
      </div>

      <div id="log"></div>

      <div class="section-tabs" id="tabs"></div>
      <div id="editor"></div>

      <div class="save-all">
        <button class="btn" onclick="save()" id="save-btn">Alle Änderungen speichern</button>
      </div>
    </div>
  </div>

  <script>
    var TOKEN = '', DATA = {}, SHAS = {}, CURRENT = '';
    var REPO = 'kimdrabe/taxi-overath', BRANCH = 'main';

    var CONFIG = [
      { key:'hero', label:'Hero', file:'src/data/hero.json', fields:[
        {k:'headline',l:'Uberschrift'},{k:'subheadline',l:'Unteruberschrift',t:'area'},{k:'description',l:'Beschreibung',t:'area'},{k:'phone',l:'Telefonnummer'}
      ]},
      { key:'services', label:'Leistungen', file:'src/data/services.json', list:'services', fields:[
        {k:'title',l:'Titel'},{k:'desc',l:'Beschreibung',t:'area'},{k:'icon',l:'Icon'}
      ]},
      { key:'whyrus', label:'Warum wir', file:'src/data/whyrus.json', list:'reasons', fields:[
        {k:'title',l:'Titel'},{k:'desc',l:'Beschreibung',t:'area'},{k:'icon',l:'Icon'}
      ]},
      { key:'about', label:'Uber uns', file:'src/data/about.json', fields:[
        {k:'text1',l:'Text 1',t:'area'},{k:'text2',l:'Text 2',t:'area'},{k:'years',l:'Jahre Erfahrung'},{k:'vehicles',l:'Fahrzeuge'}
      ]},
      { key:'faq', label:'FAQ', file:'src/data/faq.json', list:'faqs', fields:[
        {k:'q',l:'Frage'},{k:'a',l:'Antwort',t:'area'}
      ]},
      { key:'contact', label:'Kontakt', file:'src/data/contact.json', fields:[
        {k:'phone',l:'Telefon (roh)'},{k:'phone_display',l:'Telefon (Anzeige)'},{k:'email',l:'E-Mail'}
      ]}
    ];

    function log(msg, type) {
      var el = document.getElementById('log');
      el.className = 'status show ' + (type || 'loading');
      el.textContent = msg;
      if (type === 'success') setTimeout(function(){ el.className = 'status'; }, 4000);
    }

    function login() {
      TOKEN = document.getElementById('token-input').value.trim();
      if (!TOKEN) { log('Bitte Token eingeben', 'error'); return; }
      localStorage.setItem('gh_token', TOKEN);
      load();
    }

    function logout() {
      localStorage.removeItem('gh_token');
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('admin').classList.add('hidden');
    }

    function api(path, method, body) {
      return fetch('https://api.github.com' + path, {
        method: method || 'GET',
        headers: { 'Authorization': 'Bearer ' + TOKEN, 'Accept': 'application/vnd.github+json' },
        body: body ? JSON.stringify(body) : undefined,
      }).then(function(r){ return r.json(); });
    }

    function load() {
      log('Lade Daten...');
      var todo = CONFIG.map(function(cfg){
        return api('/repos/' + REPO + '/contents/' + cfg.file + '?ref=' + BRANCH).then(function(res){
          if (res.content) {
            var raw = atob(res.content.replace(/\n/g, ''));
            DATA[cfg.key] = JSON.parse(raw);
            SHAS[cfg.key] = res.sha;
          } else {
            log('Fehler beim Laden von ' + cfg.file + ': ' + (res.message || 'Unbekannt'), 'error');
          }
        });
      });
      Promise.all(todo).then(function(){
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('admin').classList.remove('hidden');
        log('Daten geladen. Klicke auf eine Sektion.', 'success');
        renderTabs();
        if (CONFIG.length) show(CONFIG[0].key);
      }).catch(function(e){ log('Fehler: ' + e, 'error'); });
    }

    function renderTabs() {
      var el = document.getElementById('tabs');
      el.innerHTML = '';
      CONFIG.forEach(function(c){
        var b = document.createElement('button');
        b.textContent = c.label;
        b.onclick = function(){ show(c.key); };
        if (c.key === CURRENT) b.className = 'active';
        el.appendChild(b);
      });
    }

    function show(key) {
      CURRENT = key;
      renderTabs();
      var cfg = CONFIG.find(function(c){ return c.key === key; });
      var data = DATA[key];
      if (!data) return;
      var html = '';
      if (cfg.list) {
        (data[cfg.list] || []).forEach(function(item, i){
          html += '<div class="card"><h2>#' + (i+1) + '</h2>';
          cfg.fields.forEach(function(f){
            var val = item[f.k] || '';
            html += '<label>' + f.l + '</label>';
            if (f.t === 'area') html += '<textarea onchange="upd(' + i + ',\'' + f.k + '\',this.value)">' + esc(val) + '</textarea>';
            else html += '<input value="' + esc(val) + '" onchange="upd(' + i + ',\'' + f.k + '\',this.value)" />';
          });
          html += '</div>';
        });
      } else {
        html += '<div class="card"><h2>' + cfg.label + '</h2>';
        cfg.fields.forEach(function(f){
          var val = data[f.k] || '';
          html += '<label>' + f.l + '</label>';
          if (f.t === 'area') html += '<textarea onchange="upd(-1,\'' + f.k + '\',this.value)">' + esc(val) + '</textarea>';
          else html += '<input value="' + esc(val) + '" onchange="upd(-1,\'' + f.k + '\',this.value)" />';
        });
        html += '</div>';
      }
      document.getElementById('editor').innerHTML = html;
    }

    function upd(idx, key, val) {
      var cfg = CONFIG.find(function(c){ return c.key === CURRENT; });
      if (idx >= 0) DATA[CURRENT][cfg.list][idx][key] = val;
      else DATA[CURRENT][key] = val;
    }

    function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function save() {
      log('Hole aktuelle SHA...');
      document.getElementById('save-btn').disabled = true;

      var todo = CONFIG.map(function(cfg){
        return api('/repos/' + REPO + '/contents/' + cfg.file + '?ref=' + BRANCH).then(function(meta){
          SHAS[cfg.key] = meta.sha;
          var json = JSON.stringify(DATA[cfg.key], null, 2);
          var utf8 = unescape(encodeURIComponent(json));
          var b64 = btoa(utf8);
          return api('/repos/' + REPO + '/contents/' + cfg.file, 'PUT', {
            message: 'Admin: ' + cfg.label + ' aktualisiert',
            content: b64,
            sha: meta.sha,
            branch: BRANCH,
          }).then(function(res){
            if (res.content) {
              SHAS[cfg.key] = res.content.sha;
              return cfg.label + ': OK';
            } else {
              throw cfg.label + ': ' + (res.message || 'Fehler');
            }
          });
        });
      });

      Promise.all(todo).then(function(results){
        log('Gespichert!\n' + results.join('\n'), 'success');
        document.getElementById('save-btn').disabled = false;
      }).catch(function(err){
        log('FEHLER:\n' + err, 'error');
        document.getElementById('save-btn').disabled = false;
      });
    }

    var savedToken = localStorage.getItem('gh_token');
    if (savedToken) {
      document.getElementById('token-input').value = savedToken;
      TOKEN = savedToken;
      load();
    }
  </script>
</body>
</html>
