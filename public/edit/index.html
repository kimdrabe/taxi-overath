<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Taxi Overath</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0b1120; color: #fff; line-height: 1.5; }
    .container { max-width: 800px; margin: 0 auto; padding: 20px; }
    h1 { font-size: 1.5rem; margin-bottom: 20px; color: #eab308; }
    label { display: block; margin-bottom: 5px; color: #94a3b8; font-size: 0.875rem; }
    input, textarea { width: 100%; padding: 10px; background: #111d32; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 0.9rem; margin-bottom: 15px; }
    input:focus, textarea:focus { outline: none; border-color: #eab308; }
    textarea { resize: vertical; min-height: 80px; }
    .card { background: #111d32; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .card h2 { font-size: 1.1rem; margin-bottom: 15px; color: #eab308; }
    .btn { background: #eab308; color: #000; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 1rem; }
    .btn:hover { background: #ca8a04; }
    .btn:disabled { opacity: 0.5; cursor: default; }
    .success { color: #22c55e; margin-top: 10px; }
    .error { color: #ef4444; margin-top: 10px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .token-box { background: #0b1120; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px; margin-bottom: 20px; }
    .token-box input { margin-bottom: 0; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .status { display: none; padding: 10px; border-radius: 8px; margin-top: 10px; }
    .status.show { display: block; }
    .status.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #22c55e; }
    .status.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; }
    .hidden { display: none; }
    .login-screen { text-align: center; padding: 60px 20px; }
    .login-screen h1 { font-size: 2rem; margin-bottom: 10px; }
    .login-screen p { color: #94a3b8; margin-bottom: 30px; }
    .login-screen input { max-width: 400px; margin: 0 auto 15px; }
    .save-all { position: sticky; bottom: 0; background: #0b1120; padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.08); margin-top: 30px; }
    .section-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 30px; }
    .section-tabs button { padding: 8px 16px; background: #111d32; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; color: #94a3b8; cursor: pointer; font-size: 0.85rem; }
    .section-tabs button.active { background: #eab308; color: #000; border-color: #eab308; font-weight: 600; }
    .section-tabs button:hover:not(.active) { border-color: #eab308; }
    .item-list { margin-bottom: 20px; }
    .item { background: #0b1120; border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 15px; margin-bottom: 10px; }
    .item h3 { color: #eab308; font-size: 0.9rem; margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div id="login-screen" class="login-screen">
      <h1>🚕 Taxi Overath Admin</h1>
      <p>Gib deinen GitHub Personal Access Token ein</p>
      <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
      <button class="btn" onclick="login()">Login</button>
      <p style="margin-top: 15px; font-size: 0.8rem; color: #64748b;">
        Token wird nur lokal im Browser gespeichert.
      </p>
    </div>

    <div id="admin-content" class="hidden">
      <div class="header">
        <h1>🚕 Taxi Overath Admin</h1>
        <button class="btn" onclick="logout()" style="background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 8px 16px; font-size: 0.85rem;">Logout</button>
      </div>

      <div class="section-tabs" id="section-tabs"></div>

      <div id="editor"></div>

      <div id="status" class="status"></div>

      <div class="save-all">
        <button class="btn" onclick="saveAll()" id="save-btn">Alle Änderungen speichern</button>
      </div>
    </div>
  </div>

  <script>
    var TOKEN = localStorage.getItem('github_token') || '';
    var SECTIONS = {};
    var ORIGINAL = {};
    var CURRENT_SECTION = '';
    var REPO = 'kimdrabe/taxi-overath';
    var BRANCH = 'main';

    var SECTION_CONFIG = {
      hero: { file: 'src/data/hero.json', label: 'Hero', fields: [
        { key: 'headline', label: 'Uberschrift', type: 'text' },
        { key: 'subheadline', label: 'Unteruberschrift', type: 'text' },
        { key: 'description', label: 'Beschreibung', type: 'textarea' },
        { key: 'phone', label: 'Telefonnummer', type: 'text' }
      ]},
      services: { file: 'src/data/services.json', label: 'Leistungen', list: 'services', fields: [
        { key: 'title', label: 'Titel', type: 'text' },
        { key: 'desc', label: 'Beschreibung', type: 'textarea' },
        { key: 'icon', label: 'Icon', type: 'text' }
      ]},
      whyus: { file: 'src/data/whyrus.json', label: 'Warum wir', list: 'reasons', fields: [
        { key: 'title', label: 'Titel', type: 'text' },
        { key: 'desc', label: 'Beschreibung', type: 'textarea' },
        { key: 'icon', label: 'Icon', type: 'text' }
      ]},
      about: { file: 'src/data/about.json', label: 'Uber uns', fields: [
        { key: 'text1', label: 'Text 1', type: 'textarea' },
        { key: 'text2', label: 'Text 2', type: 'textarea' },
        { key: 'years', label: 'Jahre Erfahrung', type: 'text' },
        { key: 'vehicles', label: 'Fahrzeuge', type: 'text' }
      ]},
      faq: { file: 'src/data/faq.json', label: 'FAQ', list: 'faqs', fields: [
        { key: 'q', label: 'Frage', type: 'text' },
        { key: 'a', label: 'Antwort', type: 'textarea' }
      ]},
      contact: { file: 'src/data/contact.json', label: 'Kontakt', fields: [
        { key: 'phone', label: 'Telefon (roh)', type: 'text' },
        { key: 'phone_display', label: 'Telefon (sichtbar)', type: 'text' },
        { key: 'email', label: 'E-Mail', type: 'text' }
      ]}
    };

    function showStatus(msg, type) {
      var el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status show ' + type;
      setTimeout(function(){ el.classList.remove('show'); }, 3000);
    }

    function login() {
      TOKEN = document.getElementById('token-input').value.trim();
      if (!TOKEN) { showStatus('Bitte Token eingeben', 'error'); return; }
      localStorage.setItem('github_token', TOKEN);
      loadAll();
    }

    function logout() {
      localStorage.removeItem('github_token');
      TOKEN = '';
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('admin-content').classList.add('hidden');
    }

    function ghApi(path, method, body) {
      var opts = {
        headers: {
          'Authorization': 'Bearer ' + TOKEN,
          'Accept': 'application/vnd.github+json',
        }
      };
      if (body) {
        opts.method = method || 'PUT';
        opts.headers['Content-Type'] = 'application/json';
        opts.body = JSON.stringify(body);
      } else {
        opts.method = method || 'GET';
      }
      return fetch('https://api.github.com' + path, opts).then(function(r){ return r.json(); });
    }

    function loadAll() {
      var keys = Object.keys(SECTION_CONFIG);
      var promises = keys.map(function(k) {
        var cfg = SECTION_CONFIG[k];
        return ghApi('/repos/' + REPO + '/contents/' + cfg.file + '?ref=' + BRANCH).then(function(data) {
          if (data.content) {
            var decoded = atob(data.content.replace(/\n/g, ''));
            SECTIONS[k] = JSON.parse(decoded);
            ORIGINAL[k] = { data: JSON.parse(decoded), sha: data.sha };
          }
        });
      });

      Promise.all(promises).then(function() {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('admin-content').classList.remove('hidden');
        renderTabs();
        if (keys.length > 0) switchSection(keys[0]);
      }).catch(function(e) {
        showStatus('Fehler beim Laden: ' + e, 'error');
      });
    }

    function renderTabs() {
      var container = document.getElementById('section-tabs');
      container.innerHTML = '';
      var keys = Object.keys(SECTION_CONFIG);
      keys.forEach(function(k) {
        var btn = document.createElement('button');
        btn.textContent = SECTION_CONFIG[k].label;
        btn.onclick = function(){ switchSection(k); };
        if (k === CURRENT_SECTION) btn.className = 'active';
        container.appendChild(btn);
      });
    }

    function switchSection(key) {
      CURRENT_SECTION = key;
      renderTabs();
      var cfg = SECTION_CONFIG[key];
      var data = SECTIONS[key];
      var editor = document.getElementById('editor');
      editor.innerHTML = '';

      if (cfg.list) {
        renderListEditor(editor, key, cfg, data);
      } else {
        renderFieldEditor(editor, cfg, data);
      }
    }

    function renderFieldEditor(container, cfg, data) {
      var card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = '<h2>' + cfg.label + '</h2>';
      cfg.fields.forEach(function(f) {
        var val = data[f.key] || '';
        if (f.type === 'textarea') {
          card.innerHTML += '<label>' + f.label + '</label><textarea onchange="updateField(\'' + f.key + '\', this.value)">' + escapeHtml(val) + '</textarea>';
        } else {
          card.innerHTML += '<label>' + f.label + '</label><input type="text" value="' + escapeHtml(val) + '" onchange="updateField(\'' + f.key + '\', this.value)" />';
        }
      });
      container.appendChild(card);
    }

    function renderListEditor(container, key, cfg, data) {
      container.innerHTML = '<div class="card"><h2>' + cfg.label + '</h2></div>';
      var list = data[cfg.list] || [];
      list.forEach(function(item, i) {
        var card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><h2 style="font-size:1rem;margin:0;">#' + (i+1) + '</h2></div>';
        cfg.fields.forEach(function(f) {
          var val = item[f.key] || '';
          if (f.type === 'textarea') {
            card.innerHTML += '<label>' + f.label + '</label><textarea onchange="updateListItem(\'' + key + '\', ' + i + ', \'' + f.key + '\', this.value)">' + escapeHtml(val) + '</textarea>';
          } else {
            card.innerHTML += '<label>' + f.label + '</label><input type="text" value="' + escapeHtml(val) + '" onchange="updateListItem(\'' + key + '\', ' + i + ', \'' + f.key + '\', this.value)" />';
          }
        });
        container.appendChild(card);
      });
    }

    function updateField(key, val) {
      SECTIONS[CURRENT_SECTION][key] = val;
    }

    function updateListItem(sectionKey, index, fieldKey, val) {
      SECTIONS[sectionKey][SECTION_CONFIG[sectionKey].list][index][fieldKey] = val;
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function saveAll() {
      var btn = document.getElementById('save-btn');
      btn.disabled = true;
      btn.textContent = 'Speichere...';

      var promises = [];
      var keys = Object.keys(SECTION_CONFIG);

      keys.forEach(function(k) {
        var cfg = SECTION_CONFIG[k];
        var content = btoa(unescape(encodeURIComponent(JSON.stringify(SECTIONS[k], null, 2))));
        var body = {
          message: 'Admin: ' + cfg.label + ' aktualisiert',
          content: content,
          branch: BRANCH,
          sha: ORIGINAL[k] ? ORIGINAL[k].sha : undefined
        };
        promises.push(
          ghApi('/repos/' + REPO + '/contents/' + cfg.file, 'PUT', body).then(function(r) {
            if (r.content) {
              ORIGINAL[k] = { sha: r.content.sha };
            }
          })
        );
      });

      Promise.all(promises).then(function() {
        showStatus('Alle Änderungen gespeichert! Seite deployed automatisch.', 'success');
        btn.disabled = false;
        btn.textContent = 'Alle Änderungen speichern';
      }).catch(function(e) {
        showStatus('Fehler beim Speichern: ' + JSON.stringify(e), 'error');
        btn.disabled = false;
        btn.textContent = 'Alle Änderungen speichern';
      });
    }

    if (TOKEN) {
      document.getElementById('token-input').value = TOKEN;
      loadAll();
    }
  </script>
</body>
</html>
